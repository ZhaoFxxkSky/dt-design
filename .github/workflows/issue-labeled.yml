name: Issue Labeled

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { issue, label } = context.payload;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const messages = {
              'help wanted': `该 issue 标记为 \`help wanted\`，欢迎社区贡献者认领。如果你有兴趣实现，请在下方留言。\n\nThis issue is marked as \`help wanted\`. Community contributions are welcome.`,
              'bug': `已确认该 Bug，已加入修复计划。\n\nBug confirmed, added to the fix backlog.`,
              'invalid': `该 issue 被标记为 \`invalid\`，即将关闭。如有疑问请重新提供更多信息后 reopen。\n\nThis issue is marked as \`invalid\` and will be closed.`,
              'wontfix': `该 issue 被标记为 \`wontfix\`，当前不会修复。感谢你的反馈。\n\nThis issue is marked as \`wontfix\`. Thank you for your feedback.`,
            };

            const msg = messages[label.name];
            if (!msg) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: msg,
            });

            // invalid 和 wontfix 自动关闭
            if (label.name === 'invalid' || label.name === 'wontfix') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
