name: Issue Labeled

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Need reproduction
        if: github.event.label.name == 'need reproduction'
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            你好 @${{ github.event.issue.user.login }}，请提供一个最小复现链接（CodeSandbox / StackBlitz / GitHub 仓库），方便我们定位问题。

            Hi @${{ github.event.issue.user.login }}, please provide a minimal reproduction link (CodeSandbox / StackBlitz / GitHub repo) so we can investigate.

      - name: Help wanted
        if: github.event.label.name == 'help wanted'
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            该 issue 标记为 `help wanted`，欢迎社区贡献者认领。如果你有兴趣实现，请在下方留言，维护者会协助 review。

            This issue is marked as `help wanted`. Community contributions are welcome. Please comment below if you'd like to work on it.
