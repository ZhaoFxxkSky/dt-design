name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, Test & Build (Node ${{ matrix.node-version }})
    strategy:
      matrix:
        node-version: [22, 24]
    uses: ./.github/workflows/_ci-build.yml
    with:
      node-version: ${{ matrix.node-version }}
